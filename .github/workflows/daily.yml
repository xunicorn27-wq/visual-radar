name: Visual Radar Manual Dry Run

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: visual-radar-daily
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Manual Dry Run deployed Visual Radar
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          DEPLOYED_URL: ${{ secrets.DEPLOYED_URL }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "x-cron-secret: $CRON_SECRET" \
            "$DEPLOYED_URL/api/automation/daily?dryRun=1"
